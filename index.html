<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deuna! | Dashboard Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --deuna-purple: #4B0082; /* Morado base */
            --deuna-electric-purple: #7B2CBF;
            --deuna-turquoise: #00F5D4; /* Turquesa vibrante */
            --deuna-dark: #240046;
            --white: #FFFFFF;
            --bg-gray: #F7F9FC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--deuna-purple);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-gray);
            min-height: 100vh;
            color: var(--deuna-dark);
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Header con degradado morado */
        header {
            background: linear-gradient(135deg, var(--deuna-purple), var(--deuna-electric-purple));
            padding: 30px 25px 60px 25px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            text-align: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.8rem;
            color: var(--deuna-turquoise);
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        /* Card de Saldo */
        .balance-section {
            background: var(--white);
            margin: -40px 25px 20px 25px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        .balance-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--deuna-purple);
        }

        /* Acciones rápidas en Turquesa */
        .quick-actions {
            display: flex;
            justify-content: space-around;
            padding: 0 25px;
            margin-bottom: 30px;
        }

        .action-btn {
            background: var(--deuna-turquoise);
            color: var(--deuna-dark);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        /* Lista de movimientos */
        .history-section {
            padding: 0 25px 100px 25px;
        }

        .history-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .transaction-card {
            background: var(--white);
            padding: 15px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .trans-icon {
            width: 45px;
            height: 45px;
            background: #f0ebff;
            color: var(--deuna-purple);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .trans-details p {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .trans-details span {
            font-size: 0.75rem;
            color: #888;
        }

        .amount {
            font-weight: 700;
        }

        .positive { color: #00c896; }
        .negative { color: var(--deuna-purple); }

        /* Floating Nav */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .nav-item {
            color: #ccc;
            font-size: 1.2rem;
        }

        .nav-item.active {
            color: var(--deuna-purple);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">deuna<span>!</span></div>
            <p style="font-size: 0.9rem; opacity: 0.9;">¡Hola, @uio_user! 👋</p>
        </header>

        <section class="balance-section">
            <p class="balance-label">Tu plata disponible</p>
            <div class="balance-amount" id="balance">$245.50</div>
            <button onclick="refreshData()" style="background: none; border: none; color: var(--deuna-electric-purple); cursor: pointer; font-size: 0.8rem; margin-top: 10px; font-weight: 600;">Actualizar saldo</button>
        </section>

        <div class="quick-actions">
            <div><button class="action-btn">QR</button><p style="font-size: 0.7rem; text-align: center; margin-top: 5px;">Pagar</p></div>
            <div><button class="action-btn">💸</button><p style="font-size: 0.7rem; text-align: center; margin-top: 5px;">Enviar</p></div>
            <div><button class="action-btn">💰</button><p style="font-size: 0.7rem; text-align: center; margin-top: 5px;">Cobrar</p></div>
        </div>

        <section class="history-section">
            <div class="history-title">
                <span>Movimientos</span>
                <span style="color: var(--deuna-electric-purple); font-size: 0.8rem;">Ver todos</span>
            </div>
            <div id="tx-list">
                </div>
        </section>

        <nav class="nav-bar">
            <div class="nav-item active">🏠</div>
            <div class="nav-item">📊</div>
            <div class="nav-item">👤</div>
        </nav>
    </div>

    <script>
        const merchants = ["Supermaxi", "Tía", "Farmacias Medicity", "Pago de Luz", "Transferencia de Mafe", "Picantería El Recreo"];
        
        function refreshData() {
            // Saldo random
            const newBalance = (Math.random() * 500 + 50).toFixed(2);
            document.getElementById('balance').innerText = `$${newBalance}`;

            const list = document.getElementById('tx-list');
            list.innerHTML = '';

            for(let i=0; i<4; i++) {
                const isPos = Math.random() > 0.6;
                const amt = (Math.random() * 40 + 5).toFixed(2);
                const merchant = merchants[Math.floor(Math.random() * merchants.length)];
                
                list.innerHTML += `
                    <div class="transaction-card">
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <div class="trans-icon">${merchant.charAt(0)}</div>
                            <div class="trans-details">
                                <p>${merchant}</p>
                                <span>Hoy, 14:20</span>
                            </div>
                        </div>
                        <div class="amount ${isPos ? 'positive' : 'negative'}">
                            ${isPos ? '+' : '-'}$${amt}
                        </div>
                    </div>
                `;
            }
        }

        // Inicializar
        window.onload = refreshData;
    </script>
</body>
</html>
